version: '3.9'
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@host.docker.internal:5432/${DB_NAME}
      - SECRET_KEY=${SECRET_KEY}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${FORGE_WORKSPACE:-~/forge-workspace}:/workspace
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
