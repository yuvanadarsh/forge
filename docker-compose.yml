version: '3.9'
services:
  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@host.docker.internal:5432/${DB_NAME}
      - SECRET_KEY=${SECRET_KEY}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY}
      - FRONTEND_URL=http://localhost:${FRONTEND_PORT:-3000}
      - WATCHFILES_FORCE_POLLING=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - /app/.venv
      - ~/forge-workspace:/root/forge-workspace
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${BACKEND_PORT:-8000}
      - NEXT_PUBLIC_WS_URL=ws://localhost:${BACKEND_PORT:-8000}
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    command: sh -c "[ -f node_modules/.install-complete ] || (npm ci && touch node_modules/.install-complete); npm run dev -- --webpack"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  frontend_node_modules:
  frontend_next:
